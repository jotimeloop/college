    <script>
	function validate()
	{
		let name=document.getElementById("name").value;
		let email=document.getElementById("email").value;
		let phone=document.getElementById("phone").value;
		let address=document.getElementById("address").value;
		pattern=/^[a-zA-Z0-9._]+@[a-zA-Z]+\.[a-z]{2,}$/;
		pattern2=/^[0-9]{10}$/;
		
		if(name=="")
		{
			alert("Name Feild can not be empty");
			return false;
		}
		else if(email=="")
		{
			alert("Email Feild can not be empty");
			return false;
		}
		else if(pattern.test(email)==false)
		{
			alert("Invaild Email");
			return false;
		}
		else if(phone=="")
		{
			alert("Phone number can not be empty");
			return false;
		}
		else if(pattern2.test(phone)==false)
		{
			alert("Invaild phone number");
			return false;
		}
		
		else if(address=="")
		{
			alert("Address Feild can not be empty");
			return false;
		}
		else
		{
			alert("Registration Successful");
			return true;
		}
		
		
	}
